name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Strip UTF-8 BOM from all web assets
        run: |
          echo "🧹 Stripping UTF-8 BOM markers (BOM causes Android WebView mojibake)..."
          # Find all text files in www/ and android/app/src/main/assets/public/
          for f in $(find www android/app/src/main/assets/public -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" -o -name "*.json" -o -name "*.svg" -o -name "*.xml" \) 2>/dev/null); do
            if [ -f "$f" ]; then
              # Check for BOM (EF BB BF) at start
              if head -c 3 "$f" | od -An -tx1 | tr -d ' \n' | grep -q '^efbbbf$'; then
                echo "  [STRIP] $f"
                # Use sed to remove first 3 bytes (BOM)
                sed -i '1s/^\xef\xbb\xbf//' "$f"
              fi
            fi
          done
          echo "✅ BOM cleanup complete"

      - name: Install dependencies
        run: npm ci

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Build APK
        run: |
          chmod +x ./android/gradlew
          cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fund-monitor-apk
          path: android/app/build/outputs/apk/debug/*.apk
