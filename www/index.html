<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a2e">
    <title>基金监控</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <div id="toolbar">
            <div class="toolbar-left">
                <h1 class="title">基金监控</h1>
                <span id="refresh-timer"></span>
            </div>
            <button id="add-btn" class="btn" onclick="FundMonitor.showAddPanel()">+ 添加基金</button>
        </div>
        <div id="indices-section">
            <h2>大盘指数</h2>
            <div id="indices-container" class="indices-grid"></div>
        </div>
        <div id="portfolio-section">
            <h2>我的持仓 <span id="total-gain" class="total-gain"></span></h2>
            <div id="funds-container"></div>
        </div>
        <div id="add-panel" class="panel hidden">
            <h3>添加基金</h3>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="输入基金名称或代码搜索..." oninput="FundMonitor.searchFund()">
                <div id="search-results" class="search-results"></div>
            </div>
            <div style="font-size:12px;color:#666;margin-bottom:10px;padding:0 2px">
                💡 也可以直接输入6位基金代码，然后填下面的金额
            </div>
            <div class="input-group">
                <input type="text" id="fund-code" placeholder="基金代码（6位数字）" maxlength="6">
                <input type="number" id="hold-amount" placeholder="持有金额（元）" step="0.01" min="0">
                <input type="number" id="nav-amount" placeholder="成本净值（如 1.0000）" step="0.0001" min="0">
            </div>
            <div class="btn-row">
                <button class="btn primary" onclick="FundMonitor.addFund()">确认添加</button>
                <button class="btn" onclick="FundMonitor.hideAddPanel()">取消</button>
            </div>
        </div>
        <div id="toast" class="toast"></div>
    </div>
    <script src="renderer-browser.js"></script>
</body>
</html>
